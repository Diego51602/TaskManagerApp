<div class="container">
  <div class="card">
    <div class="logo-container">
      <div class="logo-titulo">TaskManager</div>
      <div class="logo-subtitulo">Crea tu cuenta y empieza hoy</div>
    </div>

    <div class="form-group">
      <label>Nombre</label>
      <div class="input-wrapper">
        <span class="input-icon">👤</span>
        <input type="text" [(ngModel)]="nombre" (blur)="validarNombre()" placeholder="Tu nombre completo">
      </div>
      <p class="error-msg" *ngIf="nombreError">{{ nombreError }}</p>
    </div>

    <div class="form-group">
      <label>Email</label>
      <div class="input-wrapper">
        <span class="input-icon">📧</span>
        <input type="email" [(ngModel)]="email" (blur)="validarEmail()" placeholder="ejemplo@correo.com">
      </div>
      <p class="error-msg" *ngIf="emailError">{{ emailError }}</p>
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <div class="input-wrapper">
        <span class="input-icon">🔒</span>
        <input type="password" [(ngModel)]="password" (blur)="validarPassword()" placeholder="••••••••">
      </div>
      <p class="error-msg" *ngIf="passwordError">{{ passwordError }}</p>
      <p class="hint">Mínimo 6 caracteres con al menos una letra</p>
    </div>

    <button class="btn-primary" (click)="register()" [disabled]="loading">
      {{ loading ? 'Creando cuenta...' : 'Registrarse' }}
    </button>

    <a routerLink="/login" class="link">¿Ya tienes cuenta? Inicia sesión</a>
  </div>
</div>
