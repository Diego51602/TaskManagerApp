<div class="container">
  <div class="card">
    <div class="logo-container">
      <div class="logo-titulo">TaskManager</div>
      <div class="logo-subtitulo">Organiza tu día, domina tu semana</div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <div class="input-wrapper">
        <span class="input-icon">📧</span>
        <input type="email" [(ngModel)]="email" (blur)="validarEmail()" placeholder="ejemplo@correo.com">
      </div>
      <p class="error-msg" *ngIf="emailError">{{ emailError }}</p>
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <div class="input-wrapper">
        <span class="input-icon">🔒</span>
        <input type="password" [(ngModel)]="password" (blur)="validarPassword()" placeholder="••••••••">
      </div>
      <p class="error-msg" *ngIf="passwordError">{{ passwordError }}</p>
    </div>

    <button class="btn-primary" (click)="login()" [disabled]="loading">
      {{ loading ? 'Entrando...' : 'Entrar' }}
    </button>

    <a routerLink="/register" class="link">¿No tienes cuenta? Regístrate</a>
  </div>
</div>
